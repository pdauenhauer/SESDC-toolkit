<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link rel="stylesheet" href="../css/project-selection.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .contact-container {
      padding-top: 120px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      color: var(--green-start);
    }

    .contact-title {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--green-main);
    }

    .contact-info {
      font-size: 1.2rem;
      margin-top: 2rem;
    }

    .email-link {
      color: var(--green-start);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .email-link:hover {
      color: var(--orange-accent);
    }
  </style>
</head>
<body>
  <nav>
    <input type="checkbox" id="check">
    <label for="check" class="check-btn">
      <i class='bx bx-menu'></i>
    </label>
    <label class="logo-nav">Microgrid Toolkit</label>
    <!--Testing Nav BAR---->
    <ul id="navbar">
  </nav>

  <div class="contact-container">
    <h1 class="contact-title">Get in Touch</h1>
    <p class="contact-info">
      Feel free to reach out to us via email:<br />
      <a class="email-link" href="mailto:microgridteam@example.com">microgridteam@example.com</a>
    </p>
  </div>

   <!-- Main Content Wrapper -->
   <main class="content-wrapper">
    <!-- Page Content -->
    <div class="page-container">
      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        <input class="input" type="hidden" name="access_key" value="b577f2c5-cd3f-4e78-8641-fc14d0f4f76e">
        <label for="name">Name:</label>
        <input class="input" type="text" name="name" required>


        <label for="email">Email:</label>
        <input class="input"type="email" id="email" name="email" required>


        <label for="message">Message:</label>
        <textarea class="textarea" id="message" name="message" rows="2" required></textarea>
        <button class="contact-form" id="button" type="submit">Submit</button>
      </form >
    </div>
  </main>

  <!--added code for nav bar-->
  <script type="module" src="../public/js/firebase-init.js"></script>
  <!-- ContactUs JavaScript -->
  <script src="contactus.js"></script>
  <!-- Common JavaScript for popup functionality -->
  <script type="module" src="../js/navbar.js"></script>
</body>
</html>
